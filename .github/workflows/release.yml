name: 构建发布

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_target:
        description: '构建目标'
        required: true
        type: choice
        options:
          - all
          - docker
          - binary
        default: 'all'
      docker_tag:
        description: 'Docker 镜像标签（手动触发时使用）'
        required: false
        default: 'dev'

env:
  DOCKER_IMAGE: xiaozhu674/dns-health

permissions:
  contents: write

jobs:
  # ==================== Docker 分平台构建 ====================
  docker-build:
    name: 构建 Docker 镜像 (${{ matrix.platform }})
    if: github.event_name == 'release' || inputs.build_target == 'all' || inputs.build_target == 'docker'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成摘要标识
        id: slug
        run: |
          PLATFORM="${{ matrix.platform }}"
          echo "slug=${PLATFORM//\//-}" >> $GITHUB_OUTPUT

      - name: 构建并推送单平台镜像
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.slug.outputs.slug }}
          cache-to: type=gha,scope=${{ steps.slug.outputs.slug }},mode=max

      - name: 导出摘要
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: 上传摘要
        uses: actions/upload-artifact@v4
        with:
          name: docker-digest-${{ steps.slug.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ==================== Docker 合并多架构 Manifest ====================
  docker-merge:
    name: 合并 Docker 多架构镜像
    if: github.event_name == 'release' || inputs.build_target == 'all' || inputs.build_target == 'docker'
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: 下载所有摘要
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成 Docker 标签
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            echo "tags=${{ env.DOCKER_IMAGE }}:${VERSION},${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
          else
            TAG="${{ inputs.docker_tag || 'dev' }}"
            echo "tags=${{ env.DOCKER_IMAGE }}:${TAG},${{ env.DOCKER_IMAGE }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: 创建并推送多架构 Manifest
        working-directory: /tmp/digests
        run: |
          # 构建 tag 参数
          TAGS="${{ steps.meta.outputs.tags }}"
          TAG_ARGS=""
          IFS=',' read -ra TAG_ARRAY <<< "$TAGS"
          for tag in "${TAG_ARRAY[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done

          # 构建 digest 来源列表
          SOURCES=$(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

          docker buildx imagetools create $TAG_ARGS $SOURCES

  # ==================== 二进制文件构建 ====================
  binary:
    name: 构建二进制文件 (${{ matrix.goos }}/${{ matrix.goarch }})
    if: github.event_name == 'release' || inputs.build_target == 'all' || inputs.build_target == 'binary'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
            archive: zip
            name: dns-health-windows-amd64
            runner: ubuntu-latest
            cross_cc: x86_64-w64-mingw32-gcc
            cross_pkg: gcc-mingw-w64-x86-64
          - goos: linux
            goarch: arm64
            suffix: ""
            archive: tar.gz
            name: dns-health-linux-arm64
            runner: ubuntu-24.04-arm
            cross_cc: ""
            cross_pkg: ""
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: 构建前端
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: 同步依赖
        run: go mod tidy

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: 安装交叉编译工具链
        if: matrix.cross_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: 编译二进制文件
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          if [ -n "${{ matrix.cross_cc }}" ]; then
            export CC=${{ matrix.cross_cc }}
          fi
          go build -ldflags="-s -w" -o dns-health${{ matrix.suffix }} .

      - name: 打包文件
        run: |
          mkdir -p release/${{ matrix.name }}
          cp dns-health${{ matrix.suffix }} release/${{ matrix.name }}/
          cp config.yaml release/${{ matrix.name }}/
          mkdir -p release/${{ matrix.name }}/web/dist
          cp -r web/dist/* release/${{ matrix.name }}/web/dist/
          cp README.md release/${{ matrix.name }}/ 2>/dev/null || true

          cd release
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r ../${{ matrix.name }}.zip ${{ matrix.name }}/
          else
            tar -czf ../${{ matrix.name }}.tar.gz ${{ matrix.name }}/
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.archive }}

      # 仅 Release 触发时上传到 Release
      - name: 上传到 Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.${{ matrix.archive }}
