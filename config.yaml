# DNSHealth 健康检测解析配置文件

# 服务器配置
server:
  # 监听端口
  port: 8080
  # 运行模式：debug / release
  mode: release

# 数据库配置
database:
  # SQLite 数据库文件路径
  path: data/dns-monitor.db

# JWT 认证配置
jwt:
  # Token 有效期（小时）
  expire_hours: 24
  # JWT 签名密钥在每次启动时随机生成，无需配置

# 加密配置
encryption:
  # AES-256 加密密钥文件路径（32 字节）
  # 如果文件不存在，系统将自动生成
  key_path: data/encryption.key

# 日志清理配置
log_cleaner:
  # 数据保留天数，超过此天数的探测结果和操作日志将被自动清理（默认30天）
  retention_days: 30
  # 清理任务执行间隔（小时），默认24小时
  clean_interval_hours: 24

# 默认管理员账户已移除，首次访问时由用户自行注册
